<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Waiter — DineEasy</title>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script src="../config.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Segoe UI',sans-serif; background:#f4f6fb; color:#1a1a1a; }

    /* LOGIN */
    .login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      padding: 20px;
    }
    .login-card {
      background: white;
      border-radius: 20px;
      padding: 36px 28px;
      width: 100%;
      max-width: 380px;
    }
    .login-card h1 {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 6px;
    }
    .login-card p {
      color: #888;
      font-size: 14px;
      margin-bottom: 28px;
    }
    .login-input {
      width: 100%;
      padding: 13px 16px;
      border: 2px solid #eee;
      border-radius: 12px;
      font-size: 14px;
      font-family: inherit;
      margin-bottom: 12px;
      outline: none;
      transition: border-color 0.2s;
    }
    .login-input:focus { border-color: #ff6b35; }
    .login-btn {
      width: 100%;
      background: #0f172a;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      margin-top: 4px;
    }
    .login-error {
      color: #ef4444;
      font-size: 13px;
      margin-top: 10px;
      text-align: center;
      display: none;
    }

    /* DASHBOARD */
    .dashboard { display: none; }
    .header {
      background: #0f172a;
      color: white;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-left h1 { font-size: 16px; font-weight: 700; }
    .header-left .sub { font-size: 12px; opacity: 0.5; margin-top: 2px; }
    .waiter-name {
      background: rgba(255,255,255,0.1);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .logout-btn {
      background: none;
      border: none;
      color: rgba(255,255,255,0.5);
      cursor: pointer;
      font-size: 13px;
      padding: 0;
    }

    .tabs {
      display: flex;
      background: white;
      border-bottom: 2px solid #eee;
      position: sticky;
      top: 57px;
      z-index: 99;
    }
    .tab {
      flex: 1;
      padding: 14px;
      text-align: center;
      font-size: 14px;
      font-weight: 600;
      color: #888;
      cursor: pointer;
      border-bottom: 3px solid transparent;
    }
    .tab.active { color: #ff6b35; border-bottom-color: #ff6b35; }
    .badge {
      background: #ef4444;
      color: white;
      border-radius: 20px;
      padding: 1px 7px;
      font-size: 11px;
      margin-left: 5px;
    }

    .content { padding: 16px; max-width: 600px; margin: 0 auto; }
    .section { display: none; }
    .section.active { display: block; }

    .assigned-tables {
      background: white;
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .assigned-tables span { font-size: 13px; color: #888; font-weight: 600; }
    .table-tag {
      background: #0f172a;
      color: white;
      padding: 4px 12px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 700;
    }

    .card {
      background: white;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      border-left: 4px solid #ff6b35;
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
    .card.request { border-left-color: #3b82f6; }
    .card.done { border-left-color: #22c55e; opacity: 0.6; }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 10px;
    }
    .table-num { font-size: 18px; font-weight: 800; color: #ff6b35; }
    .card.request .table-num { color: #3b82f6; }
    .time-ago { font-size: 12px; color: #aaa; }

    .item-row {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      padding: 4px 0;
      border-bottom: 1px solid #f1f1f1;
      color: #444;
    }
    .item-row:last-child { border: none; }
    .total-row {
      display: flex;
      justify-content: space-between;
      font-size: 15px;
      font-weight: 700;
      color: #ff6b35;
      margin-top: 8px;
    }
    .request-type { font-size: 16px; font-weight: 700; margin-bottom: 4px; }

    .card-actions { display: flex; gap: 8px; margin-top: 12px; }
    .btn {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-preparing { background: #fef3c7; color: #d97706; }
    .btn-served { background: #dcfce7; color: #16a34a; }
    .btn-accept { background: #dbeafe; color: #2563eb; }
    .btn-done { background: #dcfce7; color: #16a34a; }

    .status-pill {
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
    }
    .pill-pending { background: #fef3c7; color: #d97706; }
    .pill-accepted { background: #dbeafe; color: #2563eb; }
    .pill-preparing { background: #dbeafe; color: #2563eb; }
    .pill-served { background: #dcfce7; color: #16a34a; }
    .pill-done { background: #dcfce7; color: #16a34a; }

    .empty-state { text-align:center; padding:60px 20px; color:#aaa; }
    .empty-state .icon { font-size:48px; margin-bottom:12px; }

    .new-alert {
      background: #ff6b35;
      color: white;
      padding: 12px 16px;
      text-align: center;
      font-weight: 700;
      font-size: 14px;
      display: none;
    }
    .new-alert.show { display: block; }
  </style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div class="login-screen" id="login-screen">
  <div class="login-card">
    <h1>🧑‍🍳 Waiter Login</h1>
    <p>Sign in to your waiter account</p>
    <input class="login-input" type="text" id="login-username" placeholder="Username">
    <input class="login-input" type="password" id="login-password" placeholder="Password">
    <button class="login-btn" onclick="login()">Sign In</button>
    <div class="login-error" id="login-error">Invalid username       or password</div>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">
  <div class="header">
    <div class="header-left">
      <h1>🧑‍🍳 Waiter Dashboard</h1>
      <div class="sub" id="clock"></div>
    </div>
    <div class="waiter-name">
      <span id="waiter-name-display">Waiter</span>
      <button class="logout-btn" onclick="logout()">Sign out</button>
    </div>
  </div>

  <div class="new-alert" id="new-alert">🔔 New request!</div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('orders')" id="tab-orders">
      🍽️ Orders <span class="badge" id="orders-badge">0</span>
    </div>
    <div class="tab" onclick="switchTab('requests')" id="tab-requests">
      🛎️ Requests <span class="badge" id="requests-badge">0</span>
    </div>
    <div class="tab" onclick="switchTab('done')" id="tab-done">
      ✅ Done
    </div>
  </div>

  <div class="content">
    <div class="assigned-tables" id="assigned-tables-bar">
      <span>YOUR TABLES:</span>
    </div>

    <div class="section active" id="section-orders">
      <div id="orders-list"></div>
    </div>
    <div class="section" id="section-requests">
      <div id="requests-list"></div>
    </div>
    <div class="section" id="section-done">
      <div id="done-list"></div>
    </div>
  </div>
</div>

<script>
  const API = CONFIG.API;
  const socket = io(CONFIG.SOCKET);

  let currentWaiter = null;

  // Check if already logged in
  const saved = localStorage.getItem('waiter');
  if (saved) {
    currentWaiter = JSON.parse(saved);
    showDashboard();
  }

  // Clock
  setInterval(() => {
    document.getElementById('clock').textContent =
      new Date().toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit' });
  }, 1000);

  // ===== LOGIN =====
 async function login() {
  const username = document.getElementById('login-username').value.trim();
  const password = document.getElementById('login-password').value;
  const errEl = document.getElementById('login-error');
  errEl.style.display = 'none';

  const res = await fetch(`${API}/waiter/login`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username, password })
  });
  const data = await res.json();

  if (data.error) {
    errEl.style.display = 'block';
    errEl.textContent = data.error;
    return;
  }

  currentWaiter = data.waiter;
  localStorage.setItem('waiter', JSON.stringify(data.waiter));
  showDashboard();
}
  function logout() {
    localStorage.removeItem('waiter');
    currentWaiter = null;
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
  }

  function showDashboard() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    document.getElementById('waiter-name-display').textContent = currentWaiter.name;

    // Show assigned tables
    const bar = document.getElementById('assigned-tables-bar');
    if (currentWaiter.assignedTables.length) {
      const tags = currentWaiter.assignedTables
        .map(t => `<span class="table-tag">T${t}</span>`)
        .join('');
      bar.innerHTML = `<span>YOUR TABLES:</span>${tags}`;
    } else {
      bar.innerHTML = `<span style="color:#aaa">No tables assigned yet</span>`;
    }

    loadOrders();
    loadRequests();
  }

  // ===== TAB SWITCHING =====
  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    document.getElementById('section-' + tab).classList.add('active');
  }

  function timeAgo(date) {
    const diff = Math.floor((Date.now() - new Date(date)) / 1000);
    if (diff < 60) return `${diff}s ago`;
    if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
    return `${Math.floor(diff/3600)}h ago`;
  }

  function flashAlert(msg) {
    const el = document.getElementById('new-alert');
    el.textContent = '🔔 ' + msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 3000);
    try {
      const ctx = new AudioContext();
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = 880;
      g.gain.setValueAtTime(0.3, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
      o.start(); o.stop(ctx.currentTime + 0.4);
    } catch(e) {}
  }

  // ===== LOAD ORDERS (only assigned tables) =====
  async function loadOrders() {
    const res = await fetch(`${API}/orders/all`);
    const allOrders = await res.json();

    // Filter to only this waiter's assigned tables
    const myTables = currentWaiter.assignedTables;
    const myOrders = allOrders.filter(o => myTables.includes(o.tableNumber));

    const active = myOrders.filter(o => o.status !== 'served');
    const done = myOrders.filter(o => o.status === 'served');

    document.getElementById('orders-badge').textContent = active.length;

    const container = document.getElementById('orders-list');
    if (!active.length) {
      container.innerHTML = `<div class="empty-state"><div class="icon">🍽️</div><p>No active orders for your tables</p></div>`;
    } else {
      container.innerHTML = active.map(order => `
        <div class="card">
          <div class="card-header">
            <div>
              <div class="table-num">Table ${order.tableNumber}</div>
              <div class="time-ago">${timeAgo(order.createdAt)}</div>
            </div>
            <span class="status-pill pill-${order.status}">${order.status}</span>
          </div>
          <div>
            ${order.items.map(i => `
              <div class="item-row">
                <span>${i.name} x${i.qty}</span>
                <span>₹${i.price * i.qty}</span>
              </div>`).join('')}
          </div>
          <div class="total-row">
            <span>Total</span><span>₹${order.totalPrice}</span>
          </div>
          <div class="card-actions">
            ${order.status === 'pending'
              ? `<button class="btn btn-preparing" onclick="updateOrder('${order._id}','preparing')">Preparing</button>`
              : ''}
            ${order.status === 'preparing'
              ? `<button class="btn btn-served" onclick="updateOrder('${order._id}','served')">Served</button>`
              : ''}
            ${order.status === 'served'
              ? `<button class="btn" style="background:#fee2e2;color:#ef4444;" onclick="clearTable(${order.tableNumber})">Customer Left — Clear Table</button>`
              : ''}
          </div>
        </div>`).join('');
    }

    // Done orders
    const doneContainer = document.getElementById('done-list');
    doneContainer.innerHTML = done.length
  ? done.map(order => `
      <div class="card done">
        <div class="card-header">
          <div>
            <div class="table-num">Table ${order.tableNumber}</div>
            <div class="time-ago">${timeAgo(order.createdAt)}</div>
          </div>
          <span class="status-pill pill-served">served</span>
        </div>
        <div>${order.items.map(i => `
          <div class="item-row">
            <span>${i.name} x${i.qty}</span>
            <span>₹${i.price * i.qty}</span>
          </div>`).join('')}
        </div>
        <div class="card-actions" style="margin-top:12px;">
          <button class="btn" style="background:#fee2e2;color:#ef4444;" 
            onclick="clearTable(${order.tableNumber})">
            Customer Left — Clear Table ${order.tableNumber}
          </button>
        </div>
      </div>`).join('')
  : `<div class="empty-state"><div class="icon">✅</div><p>No completed orders yet</p></div>`;

  // ===== LOAD REQUESTS (only assigned tables) =====
  async function loadRequests() {
    const res = await fetch(`${API}/requests/all`);
    const allRequests = await res.json();

    // Filter to only this waiter's tables
    const myTables = currentWaiter.assignedTables;
    const myRequests = allRequests.filter(r => myTables.includes(r.tableNumber));

    const active = myRequests.filter(r => r.status !== 'done');
    const done = myRequests.filter(r => r.status === 'done');

    document.getElementById('requests-badge').textContent = active.length;

    const container = document.getElementById('requests-list');
    if (!active.length) {
      container.innerHTML = `<div class="empty-state"><div class="icon">🛎️</div><p>No pending requests for your tables</p></div>`;
    } else {
      container.innerHTML = active.map(req => `
        <div class="card request">
          <div class="card-header">
            <div>
              <div class="table-num" style="color:#3b82f6">Table ${req.tableNumber}</div>
              <div class="time-ago">${timeAgo(req.createdAt)}</div>
            </div>
            <span class="status-pill pill-${req.status}">${req.status}</span>
          </div>
          <div class="request-type">${req.type}</div>
          <div class="card-actions">
            ${req.status === 'pending'
              ? `<button class="btn btn-accept" onclick="updateRequest('${req._id}','accepted')">👋 Accept</button>`
              : ''}
            <button class="btn btn-done" onclick="updateRequest('${req._id}','done')">✅ Done</button>
          </div>
        </div>`).join('');
    }

    // Add done requests to done tab
    const doneEl = document.getElementById('done-list');
    const doneReqHTML = done.map(req => `
      <div class="card request done">
        <div class="card-header">
          <div>
            <div class="table-num" style="color:#3b82f6">Table ${req.tableNumber}</div>
            <div class="time-ago">${timeAgo(req.createdAt)}</div>
          </div>
          <span class="status-pill pill-done">done</span>
        </div>
        <div class="request-type">${req.type}</div>
      </div>`).join('');
    if (doneReqHTML) doneEl.innerHTML += doneReqHTML;
  }

  async function updateOrder(id, status) {
    await fetch(`${API}/orders/status/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status })
    });
    loadOrders();
  }

  async function updateRequest(id, status) {
    await fetch(`${API}/requests/status/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status })
    });
    loadRequests();
  }

  async function clearTable(tableNumber) {
  if (!confirm(`Customer left Table ${tableNumber}? This will clear all orders.`)) return;
  await fetch(`${API}/tables/clear/${tableNumber}`, { method: 'POST' });
  loadOrders();
  loadRequests();
}

  // ===== SOCKET: Real-time =====
  socket.on('new-order', (order) => {
    if (currentWaiter?.assignedTables.includes(order.tableNumber)) {
      flashAlert(`New order from Table ${order.tableNumber}!`);
      loadOrders();
    }
  });

  socket.on('new-request', (req) => {
    if (currentWaiter?.assignedTables.includes(req.tableNumber)) {
      flashAlert(`Table ${req.tableNumber}: ${req.type}`);
      loadRequests();
    }
  });

  socket.on('order-updated', () => loadOrders());
  socket.on('request-updated', () => loadRequests());

  setInterval(() => { loadOrders(); loadRequests(); }, 30000);
</script>
</body>
</html>
